<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Can You Trust Them | Senator Results</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="results-page">
    <div class="site-shell">
        <header class="site-header interior-header">
            <div class="utility-bar">
                <span class="utility-kicker">State results</span>
            </div>

            <nav class="top-nav" aria-label="Primary">
                <a class="brand" href="index.html">
                    <span class="brand-mark">CYTT</span>
                    <span class="brand-text">
                        <strong>Can You Trust Them</strong>
                        <span>Senator search</span>
                    </span>
                </a>

                <div class="nav-links">
                    <a href="index.html">New Search</a>
                </div>
            </nav>

            <section class="results-hero">
                <div>
                    <h1 id="stateTitle">Loading...</h1>
                    <p id="stateSubtitle" class="hero-text">Fetching available senators and score information.</p>
                </div>
            </section>
        </header>

        <main class="results-main">
            <section id="results" class="results-section">
                <div id="resultBox" class="results-grid"></div>
                <a class="back-link" href="index.html">Back to state search</a>
            </section>
        </main>
    </div>

    <script src="js/config.js"></script>
    <script src="js/shared-utils.js"></script>
    <script src="js/results.js"></script>
</body>
</html>
